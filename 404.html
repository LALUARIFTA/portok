  <style>
    :root {
      --bg: #06060a;
      --accent: #7c4dff;
      --text: #f0f0f5;
      --text-muted: #6b6b83;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    .error-container {
      max-width: 600px;
      width: 100%;
    }

    .terminal-window {
      background: rgba(14, 14, 20, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .terminal-header {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 15px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27c93f; }

    .terminal-body {
      padding: 30px;
    }

    .error-code {
      font-size: 5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
      line-height: 1;
    }

    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    .error-msg {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .terminal-prompt {
      color: #27c93f;
      margin-right: 10px;
    }

    .command {
      color: var(--text);
    }

    .btn-home {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
    }

    .glitch {
      position: relative;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .glitch::before {
      color: #0ff;
      z-index: -1;
      animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
    }

    .glitch::after {
      color: #f0f;
      z-index: -2;
      animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(-3px, -3px); }
      60% { transform: translate(3px, 3px); }
      80% { transform: translate(3px, -3px); }
      100% { transform: translate(0); }
    }
  </style>
</head>

<body>
  <div class="error-container">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
      <div class="terminal-body">
        <div class="error-code glitch" data-text="404">404</div>
        <h1 class="error-title">FATAL_ERROR: PAGE_NOT_FOUND</h1>
        <p class="error-msg">
          Sepertinya sistem tidak dapat menemukan halaman yang Anda cari. 
          Alamat tersebut mungkin telah dipindahkan atau dihapus dari server.
        </p>
        <div class="terminal-line">
          <span class="terminal-prompt">ayek@portfolio:~$</span>
          <span class="command">cd /home/portfolio</span>
        </div>
        <div class="terminal-line">
          <span class="terminal-prompt">ayek@portfolio:~$</span>
          <span class="command">ls -a</span>
        </div>
        <a href="/" class="btn-home">Kembali ke Beranda</a>
      </div>
    </div>
  </div>
</body>
